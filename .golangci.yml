version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
  settings:
    govet:
      enable-all: false
    staticcheck:
      checks: ["all", "-SA1019"]
  exclusions:
    paths:
      - third_party
      - vendor
