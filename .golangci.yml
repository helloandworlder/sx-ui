version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

issues:
  exclude-dirs:
    - third_party
    - vendor

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple

linters-settings:
  govet:
    enable-all: false
  staticcheck:
    checks: ["all", "-SA1019"]
