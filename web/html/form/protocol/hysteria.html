{{define "form/hysteria"}}
<a-form :colon="false" :label-col="{ md: {span:8} }" :wrapper-col="{ md: {span:14} }">
    <a-form-item label="Version">
        <a-input-number v-model.number="inbound.stream.hysteria.version" :min="2" :max="2"></a-input-number>
    </a-form-item>
    <a-form-item label="Congestion">
        <a-select v-model="inbound.stream.hysteria.congestion" :dropdown-class-name="themeSwitcher.currentTheme">
            <a-select-option value="">Default</a-select-option>
            <a-select-option value="bbr">BBR</a-select-option>
            <a-select-option value="cubic">Cubic</a-select-option>
            <a-select-option value="reno">Reno</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="Up">
        <a-input v-model.trim="inbound.stream.hysteria.up" placeholder="e.g. 100 Mbps"></a-input>
    </a-form-item>
    <a-form-item label="Down">
        <a-input v-model.trim="inbound.stream.hysteria.down" placeholder="e.g. 100 Mbps"></a-input>
    </a-form-item>
    <a-form-item label="UDP Hop Port">
        <a-input v-model.trim="inbound.stream.hysteria.udphopPort" placeholder="e.g. 20000-20100"></a-input>
    </a-form-item>
</a-form>
{{end}}
