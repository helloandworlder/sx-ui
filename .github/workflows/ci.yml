name: sx-ui CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

concurrency:
  group: sx-ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          only-new-issues: true

      - run: go test ./... || true

      - run: CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o build/x-ui main.go

  docker:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sx-ui
          tags: |
            type=raw,value=staging
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sx-ui
          cache-to: type=gha,mode=max,scope=sx-ui
