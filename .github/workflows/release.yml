name: sx-ui Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, e.g. v2.9.4"
        required: true
        type: string
      publish_latest:
        description: "Mark release artifacts and image as latest"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: sx-ui-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.vars.outputs.release_version }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            publish_latest="${{ inputs.publish_latest }}"
          else
            version="${{ github.ref_name }}"
            publish_latest="true"
          fi

          if [[ ! "${version}" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${version}" >&2
            exit 1
          fi

          echo "release_version=${version}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag for manual releases
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.release_version }}
        run: |
          if git rev-parse "${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag already exists: ${RELEASE_VERSION}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_VERSION}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        run: |
          export CC=gcc
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" \
            -o build/x-ui main.go

      - name: Build xray-core (sx-core fork) + fetch geo data
        run: ./DockerInit.sh "${{ matrix.goarch }}"

      - name: Verify xray binary is sx-core fork (not upstream)
        run: |
          # The release MUST ship the sx-core fork's xray, otherwise
          # rate-limit gRPC + reverse-command + hysteria registration
          # are silently absent and the panel's signature features no-op.
          ./build/bin/xray-linux-${{ matrix.goarch }} version
          ./build/bin/xray-linux-${{ matrix.goarch }} version | grep -q "sx-core-rebase" \
            || (echo "FAIL: xray binary missing sx-core-rebase build marker"; exit 1)

      - name: Prepare runtime bundle
        run: |
          rm -rf dist
          mkdir -p dist/sx-ui/bin
          cp build/x-ui dist/sx-ui/x-ui
          cp x-ui.sh dist/sx-ui/x-ui.sh
          cp README.md LICENSE dist/sx-ui/
          cp -R build/bin/. dist/sx-ui/bin/
          chmod +x dist/sx-ui/x-ui dist/sx-ui/x-ui.sh
          find dist/sx-ui/bin -type f -exec chmod +x {} \;
          tar -C dist -czf sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz sx-ui

      - name: Generate sha256 checksum
        run: |
          sha256sum sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            > sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sx-ui
          tags: |
            type=raw,value=${{ needs.prepare.outputs.release_version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.publish_latest == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sx-ui
          cache-to: type=gha,mode=max,scope=sx-ui

  release:
    needs: [prepare, build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sx-ui-linux-*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          generate_release_notes: true
          files: |
            artifacts/sx-ui-linux-amd64/*
          body: |
            ## Install

            ```bash
            GITHUB_OWNER=${{ github.repository_owner }} \
            GITHUB_REPO=${{ github.event.repository.name }} \
            bash <(curl -Ls https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/install.sh) --instance main
            ```

            ## Install specific instance

            ```bash
            GITHUB_OWNER=${{ github.repository_owner }} \
            GITHUB_REPO=${{ github.event.repository.name }} \
            bash <(curl -Ls https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/install.sh) --instance hk01
            ```

            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/sx-ui:${{ needs.prepare.outputs.release_version }}
            ```
