name: sx-ui Release

on:
  push:
    tags:
      - "v*"

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install cross-compile deps
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        run: |
          export CC=${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w" \
            -o build/x-ui main.go

      - name: Prepare runtime bundle
        run: |
          ./DockerInit.sh "${{ matrix.goarch }}"
          rm -rf dist
          mkdir -p dist/sx-ui/bin
          cp build/x-ui dist/sx-ui/x-ui
          cp x-ui.sh dist/sx-ui/x-ui.sh
          cp README.md LICENSE dist/sx-ui/
          cp -R build/bin/. dist/sx-ui/bin/
          chmod +x dist/sx-ui/x-ui dist/sx-ui/x-ui.sh
          find dist/sx-ui/bin -type f -exec chmod +x {} \;
          tar -C dist -czf sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz sx-ui

      - name: Generate sha256 checksum
        run: |
          sha256sum sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            > sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            sx-ui-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sx-ui
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sx-ui
          cache-to: type=gha,mode=max,scope=sx-ui

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/sx-ui-linux-amd64/*
            artifacts/sx-ui-linux-arm64/*
          body: |
            ## Install

            ```bash
            GITHUB_OWNER=${{ github.repository_owner }} \
            GITHUB_REPO=${{ github.event.repository.name }} \
            bash <(curl -Ls https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/install.sh)
            ```

            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/sx-ui:${{ github.ref_name }}
            ```
